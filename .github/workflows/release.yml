name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v[0-9]+.*"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ------------------------------------------------------------------
  # 1. Create a draft GitHub release (tags only)
  # ------------------------------------------------------------------
  create-release:
    name: Create release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      - name: Get tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches Cargo.toml version
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          CARGO_VERSION="v$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')"
          if [ "$TAG" != "$CARGO_VERSION" ]; then
            echo "::error::Tag $TAG does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ steps.tag.outputs.tag }}" --draft --verify-tag --title "${{ steps.tag.outputs.tag }}"

  # ------------------------------------------------------------------
  # 2. Build binaries for each target (always)
  # ------------------------------------------------------------------
  build-binaries:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (baseline)
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

          # Linux x86_64 with AVX2 (x86-64-v3)
          - name: linux-x86_64-v3
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            rustflags: "-C target-cpu=x86-64-v3"

          # Linux x86_64 with AVX-512 (x86-64-v4)
          - name: linux-x86_64-v4
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            rustflags: "-C target-cpu=x86-64-v4"

          # Linux aarch64 (native arm64 runner, baseline)
          - name: linux-aarch64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu

          # Linux aarch64 with SVE (Graviton 3+, Axion, Grace)
          - name: linux-aarch64-neoverse-v1
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            rustflags: "-C target-cpu=neoverse-v1"

          # macOS x86_64 (cross-compiled on Apple Silicon runner)
          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin

          # macOS aarch64 (Apple Silicon, baseline)
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin

          # macOS aarch64 (Apple M1 optimized)
          - name: macos-aarch64-apple-m1
            os: macos-latest
            target: aarch64-apple-darwin
            rustflags: "-C target-cpu=apple-m1"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # ratchet:dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Linux build dependencies
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake zlib1g-dev libbz2-dev liblzma-dev \
            libcurl4-openssl-dev libssl-dev libfontconfig1-dev pkg-config clang

      # macOS build dependencies
      - name: Install macOS build deps
        if: runner.os == 'macOS'
        run: brew install bzip2 xz

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          RUSTFLAGS: ${{ matrix.rustflags || '' }}

      - name: Package
        id: package
        run: |
          BIN="rustqc"
          ARCHIVE="${BIN}-${{ matrix.name }}"

          mkdir -p "staging/${ARCHIVE}"
          cp "target/${{ matrix.target }}/release/${BIN}" "staging/${ARCHIVE}/"
          cp README.md LICENSE "staging/${ARCHIVE}/" 2>/dev/null || true

          cd staging
          tar czf "../${ARCHIVE}.tar.gz" "${ARCHIVE}"
          cd ..

          # SHA256 checksum
          shasum -a 256 "${ARCHIVE}.tar.gz" > "${ARCHIVE}.tar.gz.sha256"

          echo "archive=${ARCHIVE}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=${ARCHIVE}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF#refs/tags/}" \
            "${{ steps.package.outputs.archive }}" \
            "${{ steps.package.outputs.checksum }}"

  # ------------------------------------------------------------------
  # 3. Build per-platform Docker images on native runners
  # ------------------------------------------------------------------
  docker-build:
    name: Docker ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      - name: Lowercase image name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # ratchet:docker/setup-buildx-action@v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # ratchet:docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short commit hash
        id: git-hash
        run: echo "short_hash=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # ratchet:docker/build-push-action@v7.0.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            GIT_SHORT_HASH=${{ steps.git-hash.outputs.short_hash }}
          outputs: type=image,name=ghcr.io/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.platform }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # ratchet:actions/upload-artifact@v7.0.0
        with:
          name: digests-${{ matrix.runner }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ------------------------------------------------------------------
  # 3a. Build SIMD-optimized Docker images (single-arch each)
  # ------------------------------------------------------------------
  docker-build-simd:
    name: Docker ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: amd64-avx2
            runner: ubuntu-latest
            platform: linux/amd64
            cpu_target: x86-64-v3
            tag_suffix: avx2
          - name: amd64-avx512
            runner: ubuntu-latest
            platform: linux/amd64
            cpu_target: x86-64-v4
            tag_suffix: avx512
          - name: arm64-sve
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            cpu_target: neoverse-v1
            tag_suffix: sve
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      - name: Prepare build metadata
        id: prep
        run: |
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "$GITHUB_ENV"
          echo "short_hash=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # ratchet:docker/setup-buildx-action@v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # ratchet:docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # ratchet:docker/metadata-action@v6.0.0
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}-${{ matrix.tag_suffix }},enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=latest-${{ matrix.tag_suffix }},enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=dev-${{ matrix.tag_suffix }},enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # ratchet:docker/build-push-action@v7.0.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            GIT_SHORT_HASH=${{ steps.prep.outputs.short_hash }}
            CPU_TARGET=${{ matrix.cpu_target }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

  # ------------------------------------------------------------------
  # 3b. Merge per-platform images into a multi-arch manifest
  # ------------------------------------------------------------------
  docker-merge:
    name: Docker merge
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
      - name: Lowercase image name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # ratchet:actions/download-artifact@v8.0.1
        with:
          pattern: digests-*
          path: /tmp/digests
          merge-multiple: true

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # ratchet:docker/metadata-action@v6.0.0
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=semver,pattern={{major}},enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # ratchet:docker/setup-buildx-action@v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # ratchet:docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ env.IMAGE_NAME }}@sha256:%s ' *)

  # ------------------------------------------------------------------
  # 4. Publish to crates.io (tags only)
  # ------------------------------------------------------------------
  publish-crate:
    name: Publish to crates.io
    if: startsWith(github.ref, 'refs/tags/')
    needs: [create-release, build-binaries]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # ratchet:rust-lang/crates-io-auth-action@v1.0.4

      - name: Publish to crates.io
        run: cargo publish --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # ------------------------------------------------------------------
  # 5. Publish the release (tags only)
  # ------------------------------------------------------------------
  publish-release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [create-release, build-binaries, docker-merge, docker-build-simd, publish-crate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${{ needs.create-release.outputs.tag }}" --draft=false
