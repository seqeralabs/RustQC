[package]
name = "rustqc"
version = "0.1.0"
edition = "2021"
authors = ["Phil Ewels"]
description = "Fast quality control tools for sequencing data, written in Rust"
license = "MIT"
repository = "https://github.com/ewels/RustQC"
readme = "README.md"
keywords = ["bioinformatics", "rna-seq", "duplication", "qc"]

[[bin]]
name = "rustqc"
path = "src/main.rs"

[dependencies]
# CLI argument parsing
clap = { version = "4", features = ["derive"] }

# BAM file reading
rust-htslib = { version = "0.47", features = ["static"] }

# Plotting
plotters = "0.3"
plotters-backend = "0.3"
plotters-svg = "0.3"

# Configuration
serde = { version = "1", features = ["derive"] }
serde_yml = "0.0.12"

# Interval trees
coitrees = "0.4"

# Parallelism
rayon = "1.10"

# Random number generation
rand = "0.8"
rand_chacha = "0.3"

# General utilities
anyhow = "1"
log = "0.4"
env_logger = "0.11"
indexmap = "2"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
