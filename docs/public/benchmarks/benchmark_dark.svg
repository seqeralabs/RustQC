  <line x1="288" y1="10" x2="288" y2="525" stroke="#313244" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="386" y1="10" x2="386" y2="525" stroke="#313244" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="484" y1="10" x2="484" y2="525" stroke="#313244" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="582" y1="10" x2="582" y2="525" stroke="#313244" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="680" y1="10" x2="680" y2="525" stroke="#313244" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- Grid labels -->
  <text x="190" y="525" fill="#a6adc8" font-size="9" text-anchor="middle" dy="9">0m</text>
