<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 530">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
  </style>

  <!-- Grid lines (dashed every 5 min, solid at y-axis) -->
